<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ModHeader Clone</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body class="preload">
  <!-- Top Bar -->
  <header class="top-header">
    <div class="header-left">
      <!-- Profile switcher -->
      <button id="profile-switcher" class="profile-switcher" title="Switch profile">
        <span id="active-profile-badge" class="profile-badge">1</span>
        <span id="active-profile-name" class="profile-switcher-name">Profile 1</span>
        <svg class="chevron" viewBox="0 0 24 24"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
      </button>
      <!-- Inline rename input (hidden until rename) -->
      <input type="text" id="profile-name-input" class="profile-name-input hidden" maxlength="60">

      <!-- Profiles dropdown -->
      <div id="profiles-dropdown" class="dropdown-menu hidden">
        <div id="profiles-dropdown-list" class="dropdown-scroll"></div>
        <div class="dropdown-divider"></div>
        <button id="add-profile-btn" class="dropdown-item accent">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          New profile
        </button>
      </div>
    </div>

    <div class="header-right">
      <button id="pause-play-btn" class="header-action-btn pause" title="Pause modifying headers">
        <svg id="pause-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        <svg id="play-icon" viewBox="0 0 24 24" class="hidden"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
      </button>

      <button id="menu-btn" class="header-action-btn" title="More options">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
      </button>

      <!-- Main options menu -->
      <div id="main-menu" class="dropdown-menu align-right hidden">
        <button class="dropdown-item" data-action="rename">Rename profile</button>
        <button class="dropdown-item" data-action="duplicate">Duplicate profile</button>
        <button class="dropdown-item danger" data-action="delete">Delete profile</button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item" data-action="export">Export this profile</button>
        <button class="dropdown-item" data-action="import">Import profiles…</button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item" data-action="fullscreen">Open fullscreen</button>
        <button class="dropdown-item" data-action="help">Help</button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item" data-action="toggle-theme">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-4.08 3.05-7.44 7-7.93v15.86z"/></svg>
          <span id="theme-toggle-label">Theme: System</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Scrollable Content -->
  <main class="content content-hidden">
    <!-- Request headers -->
    <section class="card" id="request-card">
      <div class="card-head">
        <h2 class="card-title">Request headers</h2>
        <label class="switch" title="Enable request header modifications">
          <input type="checkbox" id="request-section-enabled">
          <span class="slider"></span>
        </label>
      </div>
      <div class="rows" id="request-rows"></div>
      <button id="add-request-header-btn" class="add-row-btn">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Add request header
      </button>
    </section>

    <!-- Response headers -->
    <section class="card" id="response-card">
      <div class="card-head">
        <h2 class="card-title">Response headers</h2>
        <label class="switch" title="Enable response header modifications">
          <input type="checkbox" id="response-section-enabled">
          <span class="slider"></span>
        </label>
      </div>
      <div class="rows" id="response-rows"></div>
      <button id="add-response-header-btn" class="add-row-btn">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Add response header
      </button>
    </section>

    <!-- URL filters (optional, tucked at the bottom) -->
    <section class="card" id="filters-card">
      <div class="card-head">
        <h2 class="card-title">URL filters <span class="card-subtitle">optional</span></h2>
        <label class="switch" title="Enable URL filters">
          <input type="checkbox" id="filters-section-enabled">
          <span class="slider"></span>
        </label>
      </div>
      <div class="rows" id="filter-rows"></div>
      <button id="add-filter-btn" class="add-row-btn">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Add URL filter
      </button>
      <p id="filter-hint" class="hint"></p>
    </section>

    <!-- Tab filters (optional) -->
    <section class="card" id="tab-filters-card">
      <div class="card-head">
        <h2 class="card-title">Tab filters <span class="card-subtitle">optional</span></h2>
        <label class="switch" title="Enable tab filters">
          <input type="checkbox" id="tab-filters-section-enabled">
          <span class="slider"></span>
        </label>
      </div>
      <div class="rows" id="tab-filter-rows"></div>
      <button id="add-tab-filter-btn" class="add-row-btn">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Add current tab
      </button>
      <p id="tab-filter-hint" class="hint"></p>
    </section>
  </main>

  <!-- hidden file input for imports -->
  <input type="file" id="import-file-input" class="hidden" accept=".json">

  <script src="popup.js"></script>
</body>
</html>
